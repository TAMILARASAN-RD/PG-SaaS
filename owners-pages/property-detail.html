<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details | StayWise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        /* ─── Floor Sections ─────────────────────────── */
        .floor-section {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: var(--space-4) var(--space-5);
            margin-bottom: var(--space-5);
            box-shadow: var(--shadow-sm);
        }

        .floor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .floor-title-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .floor-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ─── Room Cards ─────────────────────────────── */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--space-4);
        }

        .room-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            background: var(--background);
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .room-card:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--primary);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-3);
            border-bottom: 1px solid var(--border);
            padding-bottom: var(--space-2);
        }

        .beds-container {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .bed-indicator {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .bed-indicator:hover {
            opacity: 0.8;
            transform: scale(1.15);
        }

        .bed-occupied {
            background-color: var(--success);
        }

        .bed-vacant {
            background-color: var(--border);
            border: 1px dashed #9ca3af;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        /* ─── Room Type Label ────────────────────────── */
        .room-type-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        /* ─── Assign Tenant Summary ──────────────────── */
        .assign-summary {
            margin-top: var(--space-3);
        }

        .assign-detail-box {
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.5rem 0.75rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.35rem 1rem;
            font-size: 0.8rem;
        }

        /* ─── Icon Buttons ───────────────────────────── */
        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-muted);
            transition: background 0.15s, color 0.15s;
        }

        .btn-icon:hover {
            background: var(--background);
            color: var(--text-primary);
        }

        .btn-icon svg {
            width: 16px;
            height: 16px;
        }

        .btn-icon-sm {
            width: 24px;
            height: 24px;
        }

        .btn-icon-sm svg {
            width: 12px;
            height: 12px;
        }

        .btn-icon-danger:hover {
            background: #fef2f2;
            color: var(--error);
        }

        /* ─── Badge variants ─────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #f3f4f6;
            color: #6b7280;
        }

        .badge.success {
            background: #ecfdf5;
            color: #059669;
        }

        .badge.warning {
            background: #fffbeb;
            color: #d97706;
        }

        /* ─── Delete Button ──────────────────────────── */
        .btn-danger {
            background: var(--error);
            color: white;
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.15s;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        /* ─── Building Actions Bar ───────────────────── */
        .building-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>

<body class="dashboard-page">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="../index.html" class="logo">
                    <div class="logo-icon"><i data-lucide="building-2"
                            style="color: white; width: 24px; height: 24px;"></i></div>
                    <span>StayWise</span>
                </a>
            </div>
            <nav class="sidebar-nav">
                <a href="../owners-pages/index.html" class="sidebar-link"><i
                        data-lucide="layout-dashboard"></i><span>Overview</span></a>
                <a href="../owners-pages/properties.html" class="sidebar-link active"><i
                        data-lucide="home"></i><span>Properties</span></a>
                <a href="../owners-pages/tenants.html" class="sidebar-link"><i
                        data-lucide="users"></i><span>Tenants</span></a>
                <a href="../owners-pages/rent.html" class="sidebar-link"><i data-lucide="credit-card"></i><span>Rent
                        Management</span></a>
                <a href="../owners-pages/complaints.html" class="sidebar-link"><i
                        data-lucide="message-square"></i><span>Complaints</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="../auth/login.html" class="sidebar-link"><i data-lucide="log-out"></i><span>Log Out</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="dashboard-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <a href="../owners-pages/properties.html" class="btn btn-secondary btn-sm"
                        style="padding: 0.25rem 0.5rem;"><i data-lucide="arrow-left"></i></a>
                    <div>
                        <h2 class="page-title" id="property-name">Loading...</h2>
                        <p class="text-xs text-muted" id="property-location" style="margin-top: -0.25rem;">Map
                            loading...</p>
                    </div>
                    <div class="building-actions">
                        <button class="btn-icon" id="btn-edit-building" title="Edit Building">
                            <i data-lucide="pencil"></i>
                        </button>
                        <button class="btn-icon btn-icon-danger" id="btn-delete-building" title="Delete Building">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                </div>
                <div class="header-actions" style="display: flex; align-items: center; gap: var(--space-4);">
                    <button class="btn btn-primary" id="btn-add-floor">+ Add Floor</button>
                    <div class="profile-dropdown">
                        <div class="user-profile">
                            <span>Admin User</span>
                            <div class="avatar">A</div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <!-- Data Metrics -->
                <div class="dashboard-grid" style="margin-bottom: var(--space-6);">
                    <div class="stat-card">
                        <p class="stat-label">Total Capacity (Beds)</p>
                        <h3 class="stat-value" id="stat-capacity">--</h3>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Occupied</p>
                        <h3 class="stat-value" style="color: var(--success);" id="stat-occupied">--</h3>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Vacant</p>
                        <h3 class="stat-value" style="color: var(--error);" id="stat-vacant">--</h3>
                    </div>
                </div>

                <!-- Hierarchical Occupancy Map -->
                <div class="section-title" style="margin-bottom: var(--space-4);">
                    <h3>Occupancy Map</h3>
                </div>

                <div id="occupancy-map-container">
                    <!-- Javascript will inject rooms & floors here -->
                </div>

            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
    <script src="../js/property-manager.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
