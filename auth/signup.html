<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | StayWise</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Project Styles -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card glass-panel">
            <div class="auth-header">
                <a href="../index.html" class="logo">
                    <div class="logo-icon">
                        <i data-lucide="building-2" style="color: white; width: 24px; height: 24px;"></i>
                    </div>
                    <span>StayWise</span>
                </a>
                <h1>Get Started</h1>
                <p>Modern property management for SG/PG owners</p>
            </div>

            <!-- Official Google Signup -->
            <div id="g_id_onload" data-client_id="1234567890-mockclientid.apps.googleusercontent.com"
                data-context="signup" data-ux_mode="popup" data-callback="handleGoogleCredential"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline"
                data-text="signup_with" data-size="large" data-logo_alignment="left"
                style="display: flex; justify-content: center; margin-bottom: var(--space-4);">
            </div>

            <div class="auth-divider">
                <span>or sign up with email</span>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail"></i>
                        <input type="email" id="email" name="email" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock"></i>
                        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" name="terms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#">Terms of Service</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-full">
                    Create Account
                    <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="../auth/login.html">Log In</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
